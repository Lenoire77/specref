<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>SpecRef MVP</title>
  <style>
    body { font-family: Arial; margin: 20px; }
    select, button { margin: 5px; padding: 5px; }
    table { border-collapse: collapse; margin-top: 15px; }
    td, th { border: 1px solid #ccc; padding: 8px; }
    #history { margin-top: 20px; }
    .panel { margin-top: 20px; padding: 10px; border: 1px solid #ddd; }
  </style>
</head>
<body>

<h2>SpecRef – MVP</h2>

<div>
  <label>Category:</label>
  <select id="category">
    <option value="pipe">Pipe</option>
  </select>
</div>

<div>
  <label>Standard:</label>
  <select id="standard"></select>

  <label>Size (NPS):</label>
  <select id="size"></select>

  <label>Schedule:</label>
  <select id="schedule"></select>

  <button onclick="runQuery()">Get Data</button>
</div>

<div class="panel">
  <h3>Results</h3>
  <table id="results"></table>
</div>

<div class="panel">
  <h3>Explanation</h3>
  <div id="explanation"></div>
</div>

<div class="panel" id="history">
  <h3>History</h3>
  <ul id="historyList"></ul>
</div>

<div class="panel">
  <small>
    Disclaimer: Reference only. Verify against official standards.
  </small>
</div>

  <script src="https://cdn.jsdelivr.net/gh/Lenoire77/specref-db@main/specref-db.js"></script>
  
  <script>
// ===== INIT FILTERS =====
const standardEl = document.getElementById("standard");
const sizeEl = document.getElementById("size");
const scheduleEl = document.getElementById("schedule");

function init() {
  const standards = Object.keys(SPECREF_DB.pipe.standards);
  standards.forEach(s => {
    standardEl.innerHTML += `<option value="${s}">${s}</option>`;
  });
  updateSizes();
  updateSchedules();
  loadHistory();
}

standardEl.onchange = () => {
  updateSizes();
  updateSchedules();
};

sizeEl.onchange = updateSchedules;

function updateSizes() {
  sizeEl.innerHTML = "";
  Object.entries(SPECREF_DB.pipe.sizes).forEach(([key, val]) => {
    sizeEl.innerHTML += `<option value="${key}">NPS ${val.nps}</option>`;
  });
}

function updateSchedules() {
  scheduleEl.innerHTML = "";
  const std = standardEl.value;
  const allowedSchedules = SPECREF_DB.pipe.standards[std]?.schedules;
  if (!allowedSchedules) return;
  allowedSchedules.forEach(s => {
    scheduleEl.innerHTML += `<option value="${s}">${s}</option>`;
  });
}

// ===== QUERY =====
function runQuery() {
  const std = standardEl.value;
  const size = sizeEl.value;
  const sch = scheduleEl.value;

  const data = SPECREF_DB.pipe.calculate(size, sch);
  if (!data) {
    document.getElementById("results").innerHTML = "<tr><td>No data for this combination</td></tr>";
    return;
  }

  renderResults(data);
  renderExplanation(std);
  addToHistory(std, size, sch);
}

// ===== RENDER =====
function renderResults(d) {
  const table = document.getElementById("results");
  table.innerHTML = `
    <tr><th>Property</th><th>Value</th></tr>
    <tr><td>OD</td><td>${d.od_mm} mm</td></tr>
    <tr><td>Wall Thickness</td><td>${d.wallThickness_mm} mm</td></tr>
    <tr><td>ID</td><td>${d.id_mm} mm</td></tr>
    <tr><td>Weight</td><td>${d.weight_kg_per_m} kg/m</td></tr>
  `;
}

function renderExplanation(std) {
  const s = SPECREF_DB.pipe.standards[std];
  document.getElementById("explanation").innerHTML = `
    <b>Standard:</b> ${std}<br>
    <b>Material:</b> ${s.material}<br>
    <b>Schedules:</b> ${s.schedules ? s.schedules.join(", ") : "N/A"}
  `;
}

// ===== HISTORY =====
let history = JSON.parse(sessionStorage.getItem("specref_history")) || [];

function addToHistory(std, size, sch) {
  const entry = { std, size, sch };
  history = history.filter(h => !(h.std === std && h.size === size && h.sch === sch));
  history.unshift(entry);
  sessionStorage.setItem("specref_history", JSON.stringify(history));
  loadHistory();
}

function loadHistory() {
  const list = document.getElementById("historyList");
  list.innerHTML = "";
  history.slice(0, 5).forEach((h, i) => {
    list.innerHTML += `<li><a href="#" onclick="restoreFromHistory(${i}); return false;">${h.std} | NPS ${h.size} | Sch ${h.sch}</a></li>`;
  });
}

function restoreFromHistory(index) {
  const h = history[index];
  standardEl.value = h.std;
  updateSizes();
  sizeEl.value = h.size;
  updateSchedules();
  scheduleEl.value = h.sch;
  runQuery();
}

// ===== START =====
function waitForDB() {
  if (typeof SPECREF_DB !== "undefined") {
    init();
  } else {
    setTimeout(waitForDB, 50);
  }
}

waitForDB();
</script>

</body>
</html>
